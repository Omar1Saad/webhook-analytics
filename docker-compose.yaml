version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: posrgres_db
    restart: always
    ports:
      -"5432:5432"
    environment:
      - POSTGRES_USER: ${DB_USERNAME}
      - POSTGRES_PASSWORD: ${DB_PASSWORD}
      - POSTGRES_DB: ${DB_DATABASE}
    volumes:
      -postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: